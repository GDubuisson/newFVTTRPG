name: Create Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get version from system.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' system.json)
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Delete Existing Tag (if exists)
        run: |
          git tag -d v${{ env.version }} || true
          git push origin --delete v${{ env.version }} || true

      - name: Delete Existing Release (if exists)
        run: |
          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/v${{ env.version }} | jq -r '.id')
          if [ "$RELEASE_ID" != "null" ]; then
            curl -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID
          fi

      - name: Create Git Tag
        run: |
          git tag v${{ env.version }}
          git push origin v${{ env.version }}

      - name: Debug Git Tag
        run: |
          git show-ref --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./newFVTTRPG.zip
          tag_name: v${{ env.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
